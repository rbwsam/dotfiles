# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"

# Split panes in the current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Makes scroll wheel/trackpad scroll Claude Code's output
set -g mouse on

# Big scrollback buffer for long Claude conversations
set -g history-limit 50000

# Make PageUp scroll without needing the Ctrl+B prefix
bind -n Pageup copy-mode -u
